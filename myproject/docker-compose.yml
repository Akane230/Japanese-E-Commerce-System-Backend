services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sakura_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - media_data:/app/media
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sakura_net
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
    command: sh -c "python manage.py migrate --run-syncdb && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --worker-class gthread --threads 2 --timeout 120 --reload"

  redis:
    image: redis:7.2-alpine
    container_name: sakura_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - sakura_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sakura_celery
    restart: unless-stopped
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
    depends_on:
      - api
      - redis
    volumes:
      - .:/app
    networks:
      - sakura_net
    command: celery -A config.celery worker --loglevel=info --concurrency=4

  nginx:
    image: nginx:1.25-alpine
    container_name: sakura_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - media_data:/app/media:ro
    depends_on:
      - api
    networks:
      - sakura_net

volumes:
  redis_data:
  media_data:

networks:
  sakura_net:
    driver: bridge